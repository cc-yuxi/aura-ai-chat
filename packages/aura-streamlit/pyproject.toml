[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aura-streamlit"
version = "1.0.0"
description = "Streamlit custom component wrapper for Aura AI Chat"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "Aura AI Chat contributors" }]
dependencies = ["streamlit>=1.39"]
keywords = ["streamlit", "ai", "chat", "component", "web-component"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: User Interfaces"
]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
aura_streamlit = ["frontend/**/*"]
